<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Digital Planner 1447H</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #fccf3e;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --bg-dark: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            color: var(--white);
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), 
                        url('https://cdn.antaranews.com/cache/1200x800/2025/03/12/IMG_3240_1.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--gold);
        }

        .digital-clock {
            background: var(--gold);
            color: #000;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(252, 207, 62, 0.3);
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .time-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .time-card span { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; display: block; }
        .time-card b { font-size: 1.4rem; letter-spacing: 1px; }

        .table-container {
            width: 100%;
            max-width: 900px;
            background: var(--glass);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(252, 207, 62, 0.2);
            backdrop-filter: blur(15px);
        }

        .scroll-hint {
            display: none;
            text-align: center;
            font-size: 0.7rem;
            padding: 5px;
            background: rgba(252, 207, 62, 0.2);
            color: var(--gold);
        }

        .table-responsive {
            overflow-x: auto; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; 
        }

        th { background: rgba(252, 207, 62, 0.1); color: var(--gold); padding: 15px; font-size: 0.8rem; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .hidden-row { display: none; }
        .active-expand .hidden-row { display: table-row; animation: slideDown 0.4s ease-out; }

        .row-today { background: rgba(252, 207, 62, 0.2); border-left: 4px solid var(--gold); }

        /* Tombol */
        .footer-table {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
        }

        #btnToggle {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        #btnToggle:hover { background: var(--gold); color: black; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .scroll-hint { display: block; } 
            .time-card b { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header>
        <p id="txtDate"></p>
        <h1><i class="fa-solid fa-kaaba"></i> Imsakiyah 1447H<br>Ramadhan Karem</h1>
        <div class="digital-clock" id="txtClock">00:00:00</div>
    </header>

    <div class="dashboard" id="dashToday">
        </div>

    <div class="table-container" id="scheduleWrapper">
        <div class="scroll-hint"><i class="fa-solid fa-arrows-left-right"></i> Geser tabel ke samping</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Ramadan</th>
                        <th>Masehi</th>
                        <th>Imsak</th>
                        <th>Subuh</th>
                        <th>Dzuhur</th>
                        <th>Ashar</th>
                        <th>Maghrib</th>
                        <th>Isya</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="footer-table">
            <button id="btnToggle" onclick="handleToggle()">
                <i class="fa-solid fa-chevron-down"></i> Lihat Selengkapnya
            </button>
        </div>
    </div>

    <footer style="margin-top: 40px; opacity: 0.5; font-size: 0.8rem; text-align: center;">
        <p>&copy; Ramadhan 2026, editon by Agussaleh Rumbouw</p>
    </footer>

    <script>
        const startDay = new Date(2026, 1, 21); 
        const refMaghrib = "18:16"; 

        function addMins(timeStr, mins) {
            let [h, m] = timeStr.split(':').map(Number);
            let total = h * 60 + m + mins;
            let nH = Math.floor(total / 60) % 24;
            let nM = total % 60;
            return `${String(nH).padStart(2, '0')}:${String(nM).padStart(2, '0')}`;
        }

        function initApp() {
            const body = document.getElementById('tableBody');
            const dash = document.getElementById('dashToday');
            const todayISO = new Date().toISOString().split('T')[0];

            for (let i = 0; i < 30; i++) {
                let curr = new Date(startDay);
                curr.setDate(startDay.getDate() + i);
                let iso = curr.toISOString().split('T')[0];

                let maghrib = addMins(refMaghrib, Math.floor(i * -0.1));
                let imsak = addMins(maghrib, -828);
                let subuh = addMins(imsak, 10);
                let dzuhur = addMins(maghrib, -365);
                let ashar = addMins(maghrib, -185);
                let isya = addMins(maghrib, 72);

                let isToday = (iso === todayISO);
                let rowClass = isToday ? 'row-today' : (i > 6 ? 'hidden-row' : '');

                body.innerHTML += `
                    <tr class="${rowClass}">
                        <td><b>${i+1}</b></td>
                        <td>${curr.toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</td>
                        <td>${imsak}</td>
                        <td>${subuh}</td>
                        <td>${dzuhur}</td>
                        <td>${ashar}</td>
                        <td style="color:var(--gold); font-weight:bold">${maghrib}</td>
                        <td>${isya}</td>
                    </tr>
                `;

                if(isToday) {
                    dash.innerHTML = `
                        <div class="time-card"><span>Imsak</span><b>${imsak}</b></div>
                        <div class="time-card"><span>Subuh</span><b>${subuh}</b></div>
                        <div class="time-card"><span>Dzuhur</span><b>${dzuhur}</b></div>
                        <div class="time-card"><span>Ashar</span><b>${ashar}</b></div>
                        <div class="time-card" style="border:1px solid var(--gold)"><span>Maghrib</span><b>${maghrib}</b></div>
                        <div class="time-card"><span>Isya</span><b>${isya}</b></div>
                    `;
                }
            }
        }

        let expanded = false;
        function handleToggle() {
            const wrapper = document.getElementById('scheduleWrapper');
            const btn = document.getElementById('btnToggle');
            expanded = !expanded;

            if(expanded) {
                wrapper.classList.add('active-expand');
                btn.innerHTML = '<i class="fa-solid fa-chevron-up"></i> Sembunyikan';
            } else {
                wrapper.classList.remove('active-expand');
                btn.innerHTML = '<i class="fa-solid fa-chevron-down"></i> Lihat Selengkapnya';
                window.scrollTo({ top: wrapper.offsetTop - 50, behavior: 'smooth' });
            }
        }

        // JAM DIGITAL
        setInterval(() => {
            const now = new Date();
            document.getElementById('txtClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('txtDate').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }, 1000);

        initApp();
    </script>
</body>
</html>
